name: ATR ETF Video Generator & Telegram Bot

on:
  schedule:
    # UTC时间，对应北京时间 11:45 和 15:15
    - cron: '45 3 * * 1-5'
    - cron: '15 7 * * 1-5'
  workflow_dispatch: # 允许在GitHub页面手动点击运行测试

jobs:
  build_and_send:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (FFmpeg & Fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-wqy-zenhei
        # 确保MoviePy能调用ImageMagick处理中文字幕
        sudo apt-get install -y imagemagick
        # 修改ImageMagick策略以允许读写文本和渲染
        sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<policy domain="path" rights="read|write" pattern="@\*"/' /etc/ImageMagick-6/policy.xml

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps

    - name: Run Video Generation and Telegram Push
      env:
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        TV_SESSION_ID: ${{ secrets.TV_SESSION_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py
