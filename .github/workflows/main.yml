name: ETF monitor Workflow

on:
  workflow_dispatch: # 唯一保留的触发器：允许通过 API 或网页手动触发

jobs:
  build-and-run:
    # 固定使用 22.04，确保底层音频库兼容
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 缓存 Python 依赖包

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt

    - name: Fix Network and Install Dependencies
      run: |
        # 1. 强行把抽风的 azure 节点替换为全球主节点，根治网络卡死问题
        sudo sed -i 's/azure.archive.ubuntu.com/archive.ubuntu.com/g' /etc/apt/sources.list
        sudo apt-get update
        
        # 2. 一次性从官方主节点极速安装 FFmpeg 视频引擎和中文字体
        sudo apt-get install -y ffmpeg fonts-wqy-zenhei fonts-wqy-microhei
        
        # 3. 安装浏览器内核及其剩余依赖
        playwright install chromium --with-deps

    - name: Run Automation Script
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TV_SESSION_ID: ${{ secrets.TV_SESSION_ID }}
      run: |
        python automator.py
