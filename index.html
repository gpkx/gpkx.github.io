<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF异动监控系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        [v-cloak] { display: none; }
        
        .etf-name-column {
            width: 130px;
            min-width: 130px;
            max-width: 130px;
        }

        .watermark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="350" height="250" opacity="0.03" transform="rotate(-15)"><text x="30" y="120" font-family="sans-serif" font-weight="bold" font-size="18" fill="%23000">手机/微信:18507078300</text></svg>');
            background-repeat: repeat;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans relative">
    
    <div class="watermark-overlay"></div>

    <div id="app" v-cloak>
        <header class="bg-slate-800 text-white shadow-md sticky top-0 z-50 h-[56px]">
            <div class="container mx-auto px-4 h-full flex justify-between items-center">
                <h1 class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-chart-line text-emerald-400"></i> ETF异动监控系统
                </h1>
                <span class="text-xs bg-emerald-600 px-2 py-1 rounded font-mono animate-pulse">📱18507078300</span>
            </div>
        </header>

        <main class="container mx-auto px-2 md:px-4 pt-2 pb-4 md:pt-3 md:pb-6 max-w-5xl">
            
            <div v-if="loading" class="text-center py-12 text-gray-500">
                <i class="fa-solid fa-spinner animate-spin mr-2"></i> 正在读取最新数据...
            </div>

            <div v-else class="space-y-3">
                
                <div class="flex flex-row gap-2 relative z-40">
                    <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 relative min-w-0">
                        <button @click.stop="toggleDropdown" class="w-full flex items-center justify-between border-transparent rounded-xl px-3 py-2.5 text-sm font-semibold hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <span class="flex items-center gap-1.5 truncate">
                                <span class="truncate">📅 历史周期：{{ currentPeriodLabel || '数据加载中...' }}</span>
                            </span>
                            <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-200 ml-1 shrink-0" :class="{'rotate-180': showDropdown}"></i>
                        </button>

                        <div v-if="showDropdown" @click.stop class="absolute left-0 mt-2 bg-white border border-gray-200 rounded-xl shadow-xl z-50 p-4 w-[90vw] max-w-sm sm:w-80">
                            <div class="max-h-[60vh] overflow-y-auto custom-scrollbar pr-1">
                                <template v-if="availablePeriods.length > 0">
                                    <div v-for="month in availablePeriods" :key="month.monthKey" class="mb-4 last:mb-0">
                                        <div class="text-[13px] font-bold text-slate-400 mb-2 border-b border-gray-100 pb-1 flex items-center gap-1.5">
                                            <i class="fa-regular fa-calendar text-blue-400"></i> {{ month.monthLabel }}
                                        </div>
                                        <div class="flex flex-wrap gap-2">
                                            <button v-for="week in month.weeks" :key="week.monday"
                                                @click="selectWeek(week.monday)"
                                                class="px-2.5 py-1.5 text-xs rounded-lg transition-all border font-semibold"
                                                :class="selectedMonday === week.monday ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-slate-50 text-slate-600 border-gray-200 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600'">
                                                {{ week.weekLabel }}
                                            </button>
                                        </div>
                                    </div>
                                </template>
                                <div v-else class="text-center text-sm text-gray-400 py-4">
                                    暂无任何历史数据
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex items-center transition-all duration-300 shrink-0" :class="showSearch ? 'w-[55%] sm:w-64' : 'w-auto cursor-pointer hover:bg-gray-50'" @click="openSearch">
                        <i class="fa-solid fa-magnifying-glass text-gray-500 px-3 py-3 cursor-pointer hover:text-blue-500" @click.stop="toggleSearch"></i>
                        <input 
                            v-show="showSearch" 
                            ref="searchInput" 
                            v-model="searchQuery" 
                            type="text" 
                            placeholder="搜名称或代码..." 
                            class="w-full bg-transparent border-none outline-none text-sm font-medium text-gray-700 py-2.5 pr-2 focus:ring-0"
                            @click.stop
                        >
                        <i v-show="showSearch && searchQuery" class="fa-solid fa-xmark text-gray-400 px-3 py-3 cursor-pointer hover:text-red-500 text-xs" @click.stop="searchQuery = ''"></i>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 relative">
                    <div class="w-full custom-scrollbar overflow-x-auto md:overflow-visible">
                        <table class="w-full text-center border-collapse whitespace-nowrap min-w-max">
                            <thead class="sticky top-0 md:top-[56px] bg-slate-100 shadow-sm z-30">
                                <tr class="text-[13px] font-bold text-slate-700 select-none">
                                    <th class="py-2.5 px-1 md:px-2 text-center sticky left-0 bg-slate-100 z-40 shadow-[1px_0_0_0_#e2e8f0] etf-name-column cursor-pointer hover:bg-slate-200 transition-colors" @click="handleSort('etf_name')">
                                        <div class="flex items-center justify-center gap-1">
                                            ETF名称
                                            <div class="flex flex-col text-[9px] leading-[8px] text-gray-300">
                                                <i class="fa-solid fa-caret-up" :class="{'text-blue-600': sortColumn === 'etf_name' && sortOrder === 'asc'}"></i>
                                                <i class="fa-solid fa-caret-down" :class="{'text-blue-600': sortColumn === 'etf_name' && sortOrder === 'desc'}"></i>
                                            </div>
                                        </div>
                                    </th>
                                    
                                    <th v-for="(dayNum, idx) in currentWeekHeaders" :key="'th-'+idx" class="py-2.5 px-1 md:px-2 cursor-pointer hover:bg-slate-200 transition-colors" @click="handleSort('d'+idx)">
                                        <div class="flex items-center justify-center gap-1">
                                            周{{ ['一','二','三','四','五'][idx] }}({{ dayNum }}日)
                                            <div class="flex flex-col text-[9px] leading-[8px] text-gray-300">
                                                <i class="fa-solid fa-caret-up" :class="{'text-blue-600': sortColumn === 'd'+idx && sortOrder === 'asc'}"></i>
                                                <i class="fa-solid fa-caret-down" :class="{'text-blue-600': sortColumn === 'd'+idx && sortOrder === 'desc'}"></i>
                                            </div>
                                        </div>
                                    </th>

                                    <th class="py-2.5 px-1 md:px-2 cursor-pointer hover:bg-slate-200 transition-colors" @click="handleSort('week_status')">
                                        <div class="flex items-center justify-center gap-1">
                                            周线
                                            <div class="flex flex-col text-[9px] leading-[8px] text-gray-300">
                                                <i class="fa-solid fa-caret-up" :class="{'text-blue-600': sortColumn === 'week_status' && sortOrder === 'asc'}"></i>
                                                <i class="fa-solid fa-caret-down" :class="{'text-blue-600': sortColumn === 'week_status' && sortOrder === 'desc'}"></i>
                                            </div>
                                        </div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-[15px]">
                                <template v-for="item in filteredWeekData" :key="item.etf_code">
                                    <tr class="hover:bg-blue-50/40 transition-colors cursor-pointer" @click="toggleRow(item)">
                                        <td class="p-2 md:p-3 font-bold text-gray-800 text-left sticky left-0 bg-white shadow-[1px_0_0_0_#f3f4f6] z-10 etf-name-column">
                                            <div class="flex flex-col overflow-hidden">
                                                <div :style="getEtfNameStyle(item)" class="flex items-center justify-between whitespace-nowrap overflow-hidden">
                                                    <span class="text-slate-900 font-bold hover:text-blue-600 transition-colors flex items-center shrink-0 w-full truncate">
                                                        {{ item.etf_name }}
                                                    </span>
                                                    <i class="fa-solid text-[0.8em] ml-1 text-gray-400 transition-transform duration-200 shrink-0" 
                                                       :class="expandedRowKey === item.etf_code ? 'fa-chevron-down rotate-180 text-blue-500' : 'fa-chevron-right'"></i>
                                                </div>
                                                <div class="flex items-center gap-2 mt-0.5">
                                                    <span class="text-xs text-gray-600 font-semibold font-mono">{{ item.etf_code }}</span>
                                                </div>
                                            </div>
                                        </td>
                                        
                                        <td v-for="idx in 5" :key="'td-'+idx" class="p-2 md:p-3 font-semibold" :class="getColorClass(item.days[idx-1]?.day_status)">
                                            {{ item.days[idx-1]?.day_status || '-' }}
                                        </td>
                                        
                                        <td class="p-2 md:p-3 font-semibold" :class="getColorClass(item.week_status)">
                                            {{ item.week_status || '-' }}
                                        </td>
                                    </tr>
                                    
                                    <template v-if="expandedRowKey === item.etf_code">
                                        <tr v-for="week in getPastWeeks(item.etf_code)" :key="week.monday" class="bg-slate-50/80 border-b border-dashed border-gray-100" @click.stop>
                                            <td class="p-2 md:p-3 font-semibold text-slate-500 text-center sticky left-0 bg-slate-50/95 shadow-[1px_0_0_0_#e2e8f0] z-10 etf-name-column text-[14px]">
                                                {{ week.weekLabel }}
                                            </td>
                                            <td v-for="(day, idx) in week.days" :key="'past-td-'+idx" class="p-1 md:p-2 text-center align-middle">
                                                <div v-if="day && day.day_status" class="inline-flex items-center justify-center font-semibold text-[13px] whitespace-nowrap">
                                                    <span class="text-[11px] text-gray-500 font-normal mr-0.5">{{ parseInt(day.date.split('-')[2], 10) }}日:</span>
                                                    <span :class="getColorClass(day.day_status)">{{ day.day_status }}</span>
                                                </div>
                                                <span v-else class="text-gray-300">-</span>
                                            </td>
                                            <td class="p-2 md:p-3 text-center font-semibold text-[13px]" :class="getColorClass(week.week_status)">
                                                {{ week.week_status || '-' }}
                                            </td>
                                        </tr>
                                        <tr v-if="getPastWeeks(item.etf_code).length === 0" class="bg-slate-50/80" @click.stop>
                                            <td colspan="7" class="p-4 text-center text-xs text-gray-400 italic">
                                                该月份暂无其他周数据的历史记录
                                            </td>
                                        </tr>
                                    </template>
                                </template>
                                <tr v-if="filteredWeekData.length === 0">
                                    <td colspan="7" class="p-8 text-center text-gray-400">
                                        <i class="fa-solid fa-folder-open mb-2 text-2xl opacity-50 block"></i>
                                        当前筛选或搜索条件下无触发记录
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

        createApp({
            setup() {
                const loading = ref(true);
                const allData = ref([]); 
                const selectedMonday = ref('');
                const expandedRowKey = ref(null); 

                const searchQuery = ref('');
                const showSearch = ref(false);
                const searchInput = ref(null);

                const showDropdown = ref(false);
                const sortColumn = ref(null); 
                const sortOrder = ref('desc'); 

                const getWeekDays = (dateStr) => {
                    const parts = dateStr.split('-');
                    const y = parseInt(parts[0], 10);
                    const m = parseInt(parts[1], 10) - 1;
                    const d = parseInt(parts[2], 10);
                    const dateObj = new Date(y, m, d);
                    
                    let dayOfWeek = dateObj.getDay();
                    const offset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek; 
                    const monday = new Date(y, m, d + offset);
                    
                    const days = [];
                    for (let i = 0; i < 5; i++) {
                        const temp = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
                        const ty = temp.getFullYear();
                        const tm = String(temp.getMonth() + 1).padStart(2, '0');
                        const td = String(temp.getDate()).padStart(2, '0');
                        days.push(`${ty}-${tm}-${td}`);
                    }
                    return days;
                };

                const getWeekNumberInMonth = (dateStr) => {
                    const parts = dateStr.split('-');
                    const y = parseInt(parts[0], 10);
                    const m = parseInt(parts[1], 10) - 1;
                    const d = parseInt(parts[2], 10);
                    
                    const firstDay = new Date(y, m, 1);
                    let firstDayOfWeek = firstDay.getDay(); 
                    if (firstDayOfWeek === 0) firstDayOfWeek = 7;
                    
                    const offset = firstDayOfWeek - 1; 
                    const weekNum = Math.ceil((d + offset) / 7);
                    
                    const chineseNumbers = ['一', '二', '三', '四', '五', '六'];
                    return `第${chineseNumbers[weekNum - 1] || weekNum}周`;
                };

                const currentWeekHeaders = computed(() => {
                    if (!selectedMonday.value) return [];
                    const days = getWeekDays(selectedMonday.value);
                    return days.map(d => parseInt(d.split('-')[2], 10)); 
                });

                const uniqueDatesSet = computed(() => {
                    const validDates = allData.value
                        .filter(item => (item.day_status || item.week_status))
                        .map(item => item.date);
                    return new Set(validDates);
                });

                const availablePeriods = computed(() => {
                    const periods = {};
                    [...uniqueDatesSet.value].forEach(dateStr => {
                        const wDays = getWeekDays(dateStr);
                        const monday = wDays[0];
                        const parts = monday.split('-');
                        const monthKey = `${parts[0]}-${parts[1]}`;
                        const monthLabel = `${parts[0]}年${parseInt(parts[1], 10)}月`;

                        if (!periods[monthKey]) {
                            periods[monthKey] = { monthKey, monthLabel, weeksMap: {} };
                        }

                        if (!periods[monthKey].weeksMap[monday]) {
                            periods[monthKey].weeksMap[monday] = {
                                monday: monday,
                                weekLabel: getWeekNumberInMonth(monday)
                            };
                        }
                    });

                    const result = Object.values(periods).sort((a, b) => b.monthKey.localeCompare(a.monthKey));
                    result.forEach(m => {
                        m.weeks = Object.values(m.weeksMap).sort((a, b) => b.monday.localeCompare(a.monday));
                    });
                    return result;
                });

                const currentPeriodLabel = computed(() => {
                    if (!selectedMonday.value) return '';
                    for (const m of availablePeriods.value) {
                        for (const w of m.weeks) {
                            if (w.monday === selectedMonday.value) {
                                return `${parseInt(m.monthKey.split('-')[1], 10)}月 · ${w.weekLabel}`;
                            }
                        }
                    }
                    return '';
                });

                const toggleDropdown = (e) => {
                    e.stopPropagation();
                    showDropdown.value = !showDropdown.value;
                };

                const closeDropdown = () => {
                    showDropdown.value = false;
                };
                
                const openSearch = () => {
                    if (!showSearch.value) {
                        showSearch.value = true;
                        setTimeout(() => searchInput.value?.focus(), 100);
                    }
                };

                const toggleSearch = () => {
                    showSearch.value = !showSearch.value;
                    if (!showSearch.value) searchQuery.value = '';
                    else setTimeout(() => searchInput.value?.focus(), 100);
                };

                const selectWeek = (mondayStr) => {
                    selectedMonday.value = mondayStr;
                    closeDropdown();
                };

                const handleSort = (column) => {
                    if (sortColumn.value === column) {
                        if (sortOrder.value === 'desc') {
                            sortOrder.value = 'asc';
                        } else {
                            sortColumn.value = null; 
                            sortOrder.value = 'desc';
                        }
                    } else {
                        sortColumn.value = column;
                        sortOrder.value = 'desc';
                    }
                };

                const fetchData = async () => {
                    try {
                        loading.value = true;
                        const sourceCode = 'aHR0cHM6Ly9ldGYuaGFoYWd3LmV1Lm9yZy8=';
                        const response = await fetch(atob(sourceCode));
                        
                        if (response.ok) {
                            allData.value = await response.json();
                            if (availablePeriods.value.length > 0 && availablePeriods.value[0].weeks.length > 0) {
                                selectedMonday.value = availablePeriods.value[0].weeks[0].monday;
                            }
                        }
                    } catch (error) {
                        console.error('API 读取失败');
                        allData.value = [];
                    } finally {
                        loading.value = false;
                    }
                };

                const getStatusVal = (status) => {
                    if (!status || status === '-' || status === '--') return -9999;
                    return parseFloat(status.replace(/[^0-9.-]/g, ''));
                };

                const filteredWeekData = computed(() => {
                    if (!selectedMonday.value) return [];
                    const weekDays = getWeekDays(selectedMonday.value); 
                    
                    const etfMap = {};
                    
                    allData.value.forEach(item => {
                        const idx = weekDays.indexOf(item.date);
                        if (idx !== -1) {
                            if (!etfMap[item.etf_code]) {
                                etfMap[item.etf_code] = {
                                    etf_code: item.etf_code,
                                    etf_name: item.etf_name,
                                    days: [null, null, null, null, null],
                                    week_status: null
                                };
                            }
                            etfMap[item.etf_code].days[idx] = item;
                            
                            // 🌟 核心修复：因为 allData 是最新的日期排在最前，
                            // 所以遇到第一个有数据的 week_status，就立马锁死！确保不被这周里更旧的星期几的数据给覆盖回去。
                            if (!etfMap[item.etf_code].week_status && item.week_status && item.week_status !== '-' && item.week_status !== '--') {
                                etfMap[item.etf_code].week_status = item.week_status;
                            }
                        }
                    });
                    
                    let validItems = Object.values(etfMap).filter(item => {
                        const hasDay = item.days.some(d => d && d.day_status && d.day_status !== '-' && d.day_status !== '--');
                        const hasWeek = item.week_status && item.week_status !== '-' && item.week_status !== '--';
                        return hasDay || hasWeek;
                    });
                    
                    if (searchQuery.value) {
                        const q = searchQuery.value.toLowerCase().trim();
                        validItems = validItems.filter(item => 
                            item.etf_name.toLowerCase().includes(q) || 
                            item.etf_code.toLowerCase().includes(q)
                        );
                    }

                    validItems.sort((a, b) => {
                        if (sortColumn.value) {
                            if (sortColumn.value === 'etf_name') {
                                const cmp = a.etf_name.localeCompare(b.etf_name, 'zh-CN');
                                return sortOrder.value === 'asc' ? cmp : -cmp;
                            } else if (sortColumn.value.startsWith('d')) {
                                const idx = parseInt(sortColumn.value.substring(1), 10);
                                const valA = a.days[idx] ? getStatusVal(a.days[idx].day_status) : -9999;
                                const valB = b.days[idx] ? getStatusVal(b.days[idx].day_status) : -9999;
                                
                                if (valA === -9999 && valB !== -9999) return 1;
                                if (valB === -9999 && valA !== -9999) return -1;
                                return sortOrder.value === 'desc' ? valB - valA : valA - valB;
                            } else if (sortColumn.value === 'week_status') {
                                const valA = getStatusVal(a.week_status);
                                const valB = getStatusVal(b.week_status);
                                if (valA === -9999 && valB !== -9999) return 1;
                                if (valB === -9999 && valA !== -9999) return -1;
                                return sortOrder.value === 'desc' ? valB - valA : valA - valB;
                            }
                        } 
                        else {
                            let latestValidDayIndex = 4;
                            while (latestValidDayIndex >= 0) {
                                let hasAnyData = validItems.some(item => 
                                    item.days[latestValidDayIndex] && 
                                    item.days[latestValidDayIndex].day_status && 
                                    item.days[latestValidDayIndex].day_status !== '-' && 
                                    item.days[latestValidDayIndex].day_status !== '--'
                                );
                                if (hasAnyData) break;
                                latestValidDayIndex--;
                            }
                            
                            if (latestValidDayIndex < 0) {
                                const wkA = Math.abs(getStatusVal(a.week_status));
                                const wkB = Math.abs(getStatusVal(b.week_status));
                                return wkB - wkA;
                            }

                            const getValAbs = (item, idx) => {
                                const d = item.days[idx];
                                if (d && d.day_status) {
                                    const val = getStatusVal(d.day_status);
                                    return val === -9999 ? -9999 : Math.abs(val);
                                }
                                return -9999;
                            };
                            
                            const valA = getValAbs(a, latestValidDayIndex);
                            const valB = getValAbs(b, latestValidDayIndex);
                            
                            if (valA > -9999 && valB > -9999) return valB - valA;
                            if (valA > -9999) return -1;
                            if (valB > -9999) return 1;
                            
                            const getMaxAbs = (item) => {
                                let max = -9999;
                                item.days.forEach(d => {
                                    if (d && d.day_status) {
                                        const val = getStatusVal(d.day_status);
                                        if (val !== -9999) max = Math.max(max, Math.abs(val));
                                    }
                                });
                                return max;
                            };
                            const maxA = getMaxAbs(a);
                            const maxB = getMaxAbs(b);
                            if (maxA > -9999 && maxB > -9999) return maxB - maxA;
                            if (maxA > -9999) return -1;
                            if (maxB > -9999) return 1;
                            
                            const wkA = Math.abs(getStatusVal(a.week_status));
                            const wkB = Math.abs(getStatusVal(b.week_status));
                            return wkB - wkA;
                        }
                    });
                    
                    return validItems;
                });

                const getColorClass = (status) => {
                    if (!status || status === '-' || status === '--') return 'text-slate-300';
                    return status.includes('+') ? 'text-red-600' : 'text-green-600';
                };

                const toggleRow = (item) => {
                    expandedRowKey.value = expandedRowKey.value === item.etf_code ? null : item.etf_code;
                };

                const getPastWeeks = (etf_code) => {
                    if (!selectedMonday.value) return [];
                    const currentMonth = selectedMonday.value.substring(0, 7);
                    
                    const pastData = allData.value.filter(item => 
                        item.etf_code === etf_code && 
                        item.date.startsWith(currentMonth) && 
                        (item.day_status || item.week_status)
                    );
                    
                    const weekMap = {};
                    pastData.forEach(item => {
                        const wDays = getWeekDays(item.date);
                        const monday = wDays[0];
                        if (monday === selectedMonday.value) return; 

                        if (!weekMap[monday]) {
                            weekMap[monday] = {
                                monday: monday,
                                weekLabel: getWeekNumberInMonth(monday),
                                days: [null, null, null, null, null],
                                week_status: null
                            };
                        }
                        const idx = wDays.indexOf(item.date);
                        weekMap[monday].days[idx] = item;
                        
                        // 🌟 这里也同样加上核心修复锁，防止过去周次的数据被颠倒覆盖
                        if (!weekMap[monday].week_status && item.week_status && item.week_status !== '-' && item.week_status !== '--') {
                            weekMap[monday].week_status = item.week_status;
                        }
                    });
                    
                    return Object.values(weekMap).sort((a, b) => b.monday.localeCompare(a.monday));
                };

                const getEtfNameStyle = (item) => {
                    const name = item.etf_name || '';
                    let visualLength = 0; 
                    for (let i = 0; i < name.length; i++) {
                        const code = name.charCodeAt(i);
                        visualLength += (code >= 0 && code <= 128) ? 0.55 : 1.0;
                    }
                    const targetWidth = 115; 
                    let fontSize = targetWidth / Math.max(visualLength, 1);
                    fontSize = Math.max(10, Math.min(16, fontSize));
                    
                    return {
                        fontSize: `${fontSize}px`,
                        width: '100%',
                        lineHeight: '1.2',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'space-between',
                        whiteSpace: 'nowrap',
                        overflow: 'hidden'
                    };
                };

                onMounted(() => {
                    fetchData();
                    window.addEventListener('click', closeDropdown);
                });

                onUnmounted(() => {
                    window.removeEventListener('click', closeDropdown);
                });

                return {
                    loading, selectedMonday, filteredWeekData, getColorClass,
                    expandedRowKey, toggleRow, getPastWeeks,
                    showDropdown, toggleDropdown, closeDropdown,
                    availablePeriods, currentPeriodLabel, selectWeek, currentWeekHeaders,
                    getEtfNameStyle,
                    searchQuery, showSearch, searchInput, toggleSearch, openSearch,
                    sortColumn, sortOrder, handleSort
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
